<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achievement Tracker</title>
  <style>

    body{
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top,#1b2838,#0f1923);
      margin:0;
      padding:30px;
      color:#c7d5e0;
    }
    
    .container{
      max-width:1100px;
      margin:auto;
    }
    
    h1{
      text-align:center;
      color:#66c0f4;
      margin-bottom:30px;
      letter-spacing:1px;
    }
    
    /* Achievement panels */
    
    .section{
      background:#16202d;
      padding:22px;
      margin-bottom:25px;
      border-radius:8px;
      border:1px solid #2a475e;
      box-shadow:0 0 15px rgba(0,0,0,0.6);
      transition:.2s;
    }
    
    .section:hover{
      box-shadow:0 0 18px rgba(102,192,244,.3);
    }
    
    .section h2{
      margin-top:0;
      color:#66c0f4;
    }
    
    /* Inputs */
    
    input,select{
      background:#0f1923;
      border:1px solid #2a475e;
      color:#c7d5e0;
      padding:10px;
      border-radius:6px;
      margin:6px;
    }
    
    /* Search */
    
    #searchInput{
      width:260px;
    }
    
    /* Buttons */
    
    button{
      background:linear-gradient(180deg,#66c0f4,#417a9b);
      border:none;
      color:white;
      padding:10px 16px;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
      transition:.2s;
    }
    
    button:hover{
      background:linear-gradient(180deg,#8fd8ff,#4e9ac2);
      transform:scale(1.05);
    }
    
    /* Delete button */
    
    .delete-btn{
      background:#c0392b;
    }
    
    .delete-btn:hover{
      background:#e74c3c;
    }
    
    /* Table */
    
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }
    
    th{
      background:#1b2838;
      color:#66c0f4;
      padding:12px;
      text-align:left;
    }
    
    td{
      padding:12px;
      border-bottom:1px solid #2a475e;
    }
    
    tr:hover{
      background:#1f2f44;
    }
    
    /* Achievement difficulty badges */
    
    .badge{
      padding:5px 10px;
      border-radius:14px;
      font-size:12px;
      font-weight:bold;
      color:white;
    }
    
    .easy{background:#4caf50;}
    .medium{background:#f39c12;}
    .hard{background:#e74c3c;}
    .legendary{
      background:linear-gradient(45deg,#8e44ad,#6f42c1);
      box-shadow:0 0 8px rgba(155,89,182,.8);
    }
    
    /* messages */
    
    #playerMessage,
    #achievementMessage,
    #assignMessage{
      margin-top:10px;
      font-weight:bold;
    }
    
    </style>
</head>
<body>

  <div class="container">
    <h1>Achievement Tracker</h1>

    <div class="section">
      <input type="text" id="searchInput" placeholder="Search achievements...">
      <select id="searchFilter">
        <option value="achievement">Achievement</option>
        <option value="game">Game</option>
        <option value="player">Player / Username</option>
        <option value="difficulty">Difficulty</option>
      </select>
    </div>
    

    <div class="section">
      <h2>Achievements</h2>
      <div id="achievementList">Loading...</div>
    </div>
<div class="section">
  <h2>➕ Add New Player</h2>
  <form id="playerForm">
    <input type="text" id="name" placeholder="Player Name" required>
    <input type="text" id="user_name" placeholder="Username" required>
    <button type="submit">Add Player</button>
  </form>
  <div id="playerMessage"></div>
</div>

<div class="section">
  <h2>Add Achievement</h2>

  <form id="achievementForm">

    <input type="text" id="achievement_name" placeholder="Achievement Name" required>
  
    <select id="gameSelect" required>
      <option value="">Select Game</option>
    </select>
  
    <select id="difficulty" required>
      <option value="">Select Difficulty</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Hard">Hard</option>
      <option value="Legendary">Legendary</option>
    </select>
  
    <input type="date" id="completed_date">
  
    <button type="submit">Add Achievement</button>
  
  </form>

  <div id="achievementMessage"></div>
</div>


<div class="section">
  <h2>Assign Player to Achievement</h2>

  <form id="assignForm">

    <select id="achievementSelect">
      <option value="">Select Achievement</option>
    </select>

    <select id="playerSelect">
      <option value="">Select Player</option>
    </select>

    <button type="submit">Assign Player</button>

  </form>

  <div id="assignMessage"></div>
</div>

  </div>

  <script>
    const API_URL = 'http://localhost:3000/api';
    let allAchievements = [];

    async function loadAchievements() {
      const response = await fetch(`${API_URL}/achievements`);
      allAchievements = await response.json();
      displayAchievements(allAchievements);
    }

    function displayAchievements(achievements) {
      let html = '<table>';
      html += '<tr><th>Achievement</th><th>Game</th><th>Player</th><th>Username</th><th>Difficulty</th><th>Completed Date</th><th>Actions</th></tr>';
      achievements.forEach(a => {
        html += `<tr>
        <td>🏆 ${a.achievement_name}</td>
        <td>${a.game_title}</td>
        <td>${a.player_name || 'Unassigned'}</td>
        <td>${a.user_name || '-'}</td>
        <td><span class="badge ${a.difficulty.toLowerCase()}">${a.difficulty}</span></td>
        <td>${a.completed_date ? new Date(a.completed_date).toLocaleDateString() : 'In Progress'}</td>
        <td>
        <button class="delete-btn" onclick="deleteAchievement(${a.achievement_id})">Delete</button>
        </td>
        </tr>`;
      });
      html += '</table>';
      document.getElementById('achievementList').innerHTML = html;
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
  const search = e.target.value.toLowerCase();
  const filter = document.getElementById('searchFilter').value;

  const filtered = allAchievements.filter(a => {
    if (filter === 'achievement') return a.achievement_name.toLowerCase().includes(search);
    if (filter === 'game') return a.game_title.toLowerCase().includes(search);
    if (filter === 'player') return a.player_name.toLowerCase().includes(search) || a.user_name.toLowerCase().includes(search);
    if (filter === 'difficulty') return a.difficulty.toLowerCase().includes(search);
  });

  displayAchievements(filtered);
});


    window.addEventListener('DOMContentLoaded', () => {
  loadAchievements();
  loadDropdowns();
});

document.getElementById('playerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const playerData = {
    name: document.getElementById('name').value,
    user_name: document.getElementById('user_name').value,
  };
  
  try {
    const response = await fetch(API_URL + '/players', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(playerData)
    });
    
    const newPlayer = await response.json();
    document.getElementById('playerMessage').innerHTML = 
      '<p style="color: green;">Player added: ' + newPlayer.name + '</p>';
    document.getElementById('playerForm').reset();
  } catch (error) {
    document.getElementById('playerMessage').innerHTML = '<p style="color: red;">Error adding player</p>';
  }
});

async function loadDropdowns() {

const achievements = await fetch(API_URL + '/achievements').then(r => r.json());
const players = await fetch(API_URL + '/players').then(r => r.json());
const games = await fetch(API_URL + '/games').then(r => r.json());

const achievementSelect = document.getElementById('achievementSelect');
const playerSelect = document.getElementById('playerSelect');
const gameSelect = document.getElementById('gameSelect');

// CLEAR existing dropdown options first
achievementSelect.innerHTML = '<option value="">Select Achievement</option>';
playerSelect.innerHTML = '<option value="">Select Player</option>';
gameSelect.innerHTML = '<option value="">Select Game</option>';

achievements.forEach(a => {
  achievementSelect.innerHTML +=
    `<option value="${a.achievement_id}">${a.achievement_name}</option>`;
});

players.forEach(p => {
  playerSelect.innerHTML +=
    `<option value="${p.player_id}">${p.name}</option>`;
});

games.forEach(g => {
  gameSelect.innerHTML +=
    `<option value="${g.game_id}">${g.title}</option>`;
});

}


async function deleteAchievement(achievement_id) {
  if (!confirm('Are you sure you want to delete this achievement?')) {
    return;
  }
  
  try {
    const response = await fetch(API_URL + '/achievements/' + achievement_id, {
      method: 'DELETE'
    });
    
    if (response.ok) {
      alert('achievement deleted successfully!');
      loadAchievements();
      loadDropdowns();

    } else {
      alert('Error deleting achievement');
    }
  } catch (error) {
    alert('Error: ' + error.message);
  }
}

document.getElementById('achievementForm').addEventListener('submit', async function(e) {

e.preventDefault();

const completedDateValue = document.getElementById('completed_date').value;

const data = {
  achievement_name: document.getElementById('achievement_name').value,
  game_id: document.getElementById('gameSelect').value,
  difficulty: document.getElementById('difficulty').value,
  completed_date: completedDateValue ? completedDateValue : null
};

try {

  await fetch(API_URL + '/achievements', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  document.getElementById('achievementMessage').innerHTML =
    '<p style="color: green;">Achievement added!</p>';

  loadAchievements();
  loadDropdowns();

} catch (err) {

  document.getElementById('achievementMessage').innerHTML =
    '<p style="color: red;">Error adding achievement</p>';

}

});

document.getElementById('assignForm').addEventListener('submit', async function(e) {

e.preventDefault();

const data = {
  achievement_id: document.getElementById('achievementSelect').value,
  player_id: document.getElementById('playerSelect').value
};

try {

  await fetch(API_URL + '/assign-player', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  document.getElementById('assignMessage').innerHTML =
    '<p style="color: green;">Player assigned!</p>';

    loadAchievements();
loadDropdowns();

} catch (err) {

  document.getElementById('assignMessage').innerHTML =
    '<p style="color: red;">Error assigning player</p>';

}

});


  </script>

</body>
</html>
